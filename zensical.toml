[project]
site_name = "Zensical Demo"
site_description = "A demonstration site built with Zensical"
site_author = "Ruud Hirschmann"
copyright = """
Copyright © 2026 Ruud Hirschmann
"""

# Optional explicit navigation
nav = [
	{ "Welcome" = "index.md" },
	{ "Getting started" = [
			{ "Overview" = "getting-started/index.md" },
			{ "Deployment" = "getting-started/deployment.md" }
		] },
	{ "Features" = [
			{ "Overview" = "features/index.md" },
			{ "Components" = "features/components.md" },
			{ "Markdown" = "features/markdown.md" }
		] },
	{ "About" = [
			{ "Overview" = "about/index.md" },
			{ "Code of Conduct" = "about/code-of-conduct.md" },
			{ "Contributing" = "about/contributing.md" },
			{ "Changelog" = "about/changelog.md" }
		] }
]

[project.theme]
variant = "classic"

[project.markdown]
# Enable Markdown extensions
extensions = [
	"admonition",
	"footnotes",
	"tables",
	"codehilite",
	"toc",
]

[project.navigation]
# Enable navigation features
path = true
footer = true

[project.navigation.instant]
# Instant navigation settings
enabled = true
prefetch = true
