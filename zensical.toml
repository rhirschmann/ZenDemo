[project]
site_name = "Zensical Demo"
site_description = "A demonstration site built with Zensical"
site_author = "Ruud Hirschmann"
copyright = """
Copyright © 2026 Ruud Hirschmann
"""

[project.theme]
variant = "classic"


# Optional explicit navigation
nav = [
	{ "Home" = "index.md" },
	{ "Getting Started" = "getting-started/index.md" },
	{ "Features" = "features/index.md" },
	{ "Component Showcase" = "features/components.md" }
]

[project.markdown]
# Enable Markdown extensions
extensions = [
	"admonition",
	"footnotes",
	"tables",
	"codehilite",
	"toc",
]

[project.navigation]
# Enable navigation features
path = true
footer = true

[project.navigation.instant]
# Instant navigation settings
enabled = true
prefetch = true
